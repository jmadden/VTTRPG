# Render Blueprint (starter). Deploys the whole app as ONE web service that
# serves the built SPA + API + WebSocket same-origin, plus a managed Postgres.
# See docs/10-cloud-deployment.md. Verify field names against Render's current
# Blueprint schema before first use; the DB seed is run manually (see docs/10).
services:
  - type: web
    name: vttrpg
    runtime: node
    plan: free
    # Root build: shared -> backend -> frontend/dist. Start: backend serves the SPA.
    buildCommand: npm ci && npm run build
    startCommand: npm run start -w backend
    healthCheckPath: /health
    envVars:
      # Make the backend serve frontend/dist (same-origin). Render sets PORT itself.
      - key: SERVE_CLIENT
        value: "1"
      - key: NODE_ENV
        value: production
      # Wire the DB connection string from the managed Postgres below. Render's
      # same-region internal URL does not need SSL, so DATABASE_SSL is left unset.
      - key: DATABASE_URL
        fromDatabase:
          name: vttrpg-db
          property: connectionString

databases:
  - name: vttrpg-db
    plan: free
